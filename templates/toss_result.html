<!DOCTYPE html>
<html>
<head>
    <title>Toss Result</title>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        font-family: "Segoe UI", sans-serif;

        background:
            linear-gradient(
                to bottom,
                #dff2ff 0%,
                #dff2ff 45%,
                #67b85f 45%,
                #5ba854 100%
            );

        color: #222;
    }

    .result {
        font-size: 3rem;
        font-weight: 700;

        background: rgba(255,255,255,0.95);

        padding: 30px 40px;

        border-radius: 18px;

        box-shadow:
            0 10px 30px rgba(0,0,0,0.12);

        margin-bottom: 20px;

        color: #1f3d21;
        text-align: center;
    }

    p {
        font-size: 1.15rem;
        color: #444;

        background: rgba(255,255,255,0.9);

        padding: 15px 25px;

        border-radius: 12px;

        margin-bottom: 30px;
    }

    .btn {
        background: #2e7d32;
        color: white;

        padding: 15px 35px;

        font-size: 1rem;
        font-weight: 600;

        border: none;
        border-radius: 10px;

        cursor: pointer;

        transition: all 0.2s ease;

        box-shadow:
            0 4px 12px rgba(46,125,50,0.25);
    }

    .btn:hover {
        background: #1b5e20;
        transform: translateY(-2px);
    }

    .btn:active {
        transform: translateY(0);
    }

    a {
        text-decoration: none;
    }

    /* Toss Animation, kinda goofy but works */
    .coin-anim {
        font-size: 8rem;
        position: absolute;
        top: 50%;
        left: 50%;
        margin-top: -50px;
        transform: translate(-50%, -50%);
        animation: flipCoin 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        z-index: 50;
    }

    @keyframes flipCoin {
        0% { transform: translate(-50%, -50%) rotateY(0deg) scale(1); opacity: 1; }
        40% { transform: translate(-50%, -200%) rotateY(1440deg) scale(1.5); opacity: 1; }
        85% { transform: translate(-50%, -50%) rotateY(2880deg) scale(1); opacity: 1; }
        100% { transform: translate(-50%, -50%) rotateY(2880deg) scale(1); opacity: 0; visibility: hidden; }
    }

    .result-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        opacity: 0;
        animation: revealResult 0.5s ease forwards;
        animation-delay: 1.8s; /* waits for coin to finish */
    }

    @keyframes revealResult {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    </style>
</head>

<body>
    
    <div class="coin-anim">🪙</div>

    <div class="result-container">
        {% if won == 1 %}
            <div class="result">You won the Toss!</div>
            <p>You will go first!</p>
        {% else %}
            <div class="result">You lost the Toss</div>
            <p>Computer will go first</p>
        {% endif %}

        <a href="/setup">
            <button class="btn">Continue to the game</button>
        </a>
    </div>

</body>
</html>
