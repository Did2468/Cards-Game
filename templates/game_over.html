<!DOCTYPE html>
<html>
<head>

<title>Game Over</title>

<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body {

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:"Segoe UI", sans-serif;

    background:#3f8f4f;

    padding:20px;

    color:#222;

}



.container {

    width:100%;
    max-width:420px;

    background:#fffdf5;

    padding:35px 25px;

    border-radius:22px;

    text-align:center;

    border:4px solid #e0b52c;

    box-shadow:

        0 15px 35px rgba(0,0,0,.3);

}





.trophy {

    font-size:70px;

    margin-bottom:15px;

}





.winner {

    font-size:2.8rem;

    font-weight:900;

    color:#1b5e20;

    margin-bottom:15px;


}



.message {

    background:#f3f5f3;

    padding:15px;

    border-radius:12px;

    color:#555;

    margin-bottom:25px;

    font-size:1.1rem;

}




button {


    background:#f4c542;

    color:#222;


    border:none;

    padding:15px 35px;


    font-size:1.1rem;

    font-weight:800;


    border-radius:25px;


    cursor:pointer;


    transition:.2s;


}



button:hover {

    background:#ffca28;

    transform:translateY(-3px);

}


button:active {

    transform:scale(.97);

}



a {

    text-decoration:none;

}



</style>

</head>


<body>



<div class="container">


<div class="trophy">
🏆
</div>



<div class="winner">

{{winner}} WON!

</div>



<div class="message">

{{messsage}}

</div>



<a href="/">

<button>
Play Again
</button>

</a>



</div>



</body>
</html>
