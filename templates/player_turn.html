<!DOCTYPE html>
<html>
<head>
<title>Your Turn</title>

<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body {

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:"Segoe UI", sans-serif;

    background:#3f8f4f;

    padding:10px;

    overflow-x:hidden;
}


/* card */

.card {

    width:100%;
    max-width:340px;

    background:#fffdf5;

    border-radius:18px;

    overflow:hidden;

    box-shadow:
        0 12px 25px rgba(0,0,0,.3);

    border:3px solid #e0b52c;

    animation:appear .25s ease;

}


@keyframes appear {

    from {
        transform:scale(.95);
        opacity:0;
    }

    to {
        transform:scale(1);
        opacity:1;
    }

}


/* header */


.card-header {

    background:#1b5e20;

    color:white;

    padding:14px;

    text-align:center;

}


.card-header h1 {

    font-size:1.35rem;

}


.player-name {

    margin-top:5px;

    font-size:1.15rem;

    font-weight:700;

}



/* info removed for scoreboard */



.subtitle {

    text-align:center;

    color:#666;

    font-size:.85rem;

    margin-bottom:8px;

}



/* stats grid */


form {

    padding:10px;

    display:grid;

    grid-template-columns:
        repeat(2, minmax(0, 1fr));

    gap:8px;

}



.stat {

    background:#f3f5f3;

    border-radius:10px;

    padding:8px;

    cursor:pointer;

    text-align:center;

    border:2px solid transparent;

    transition:.15s ease;

    user-select:none;

    min-width:0;

}



/* clickable animation */

.stat:hover {

    transform:scale(1.03);

    background:#e8f5e9;

    border-color:#2e7d32;

    box-shadow:
        0 5px 12px rgba(46,125,50,.2);

}


.stat:active {

    transform:scale(.98);

}



input[type="submit"] {

    display:none;

}



.stat-title {

    font-size:.65rem;

    color:#777;

}


.stat-value {

    font-size:.95rem;

    font-weight:800;

    color:#222;

    overflow:hidden;

}




.footer {

    text-align:center;

    padding-bottom:10px;

    color:#888;

    font-size:.7rem;

}

/* Scoreboard & Visual Decks */
.scoreboard {
    position: fixed;
    bottom: 0; left: 0; width: 100%;
    background: #1b5e20;
    color: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 15px;
    font-weight: 800;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
    z-index: 100;
}
.score-badge {
    background: #e0b52c;
    color: #222;
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 1.1rem;
}
</style>

</head>


<body>

<!-- Scoreboard -->
<div class="scoreboard">

    <div>AI: <span class="score-badge">{{ ai_cards_left }}</span></div>
